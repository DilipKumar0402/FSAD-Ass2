openapi: 3.0.0

info:
  title: Hostel Complaint Management API
  version: 1.0.0
  description: API documentation for Smart Hostel Complaint & Maintenance Management System

servers:
  - url: http://localhost:5000/api

tags:
  - name: Authentication
    description: User authentication APIs

  - name: Complaints
    description: Complaint management APIs

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    User:
      type: object
      properties:
        _id:
          type: string

        name:
          type: string

        email:
          type: string

        role:
          type: string
          enum:
            - student
            - admin
            - technician

    Complaint:
      type: object
      properties:
        _id:
          type: string

        title:
          type: string

        description:
          type: string

        category:
          type: string

        urgency:
          type: string

        roomNumber:
          type: string

        status:
          type: string
          enum:
            - Pending
            - In Progress
            - Resolved

paths:

  /auth/register:
    post:
      tags:
        - Authentication

      summary: Register a new user

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - name
                - email
                - password

              properties:
                name:
                  type: string

                email:
                  type: string

                password:
                  type: string

                role:
                  type: string

      responses:
        '201':
          description: User registered successfully

        '400':
          description: User already exists

  /auth/login:
    post:
      tags:
        - Authentication

      summary: Login user

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - email
                - password

              properties:
                email:
                  type: string

                password:
                  type: string

      responses:
        '200':
          description: Login successful

        '401':
          description: Invalid credentials

  /complaints:

    get:
      tags:
        - Complaints

      summary: Get all complaints

      security:
        - bearerAuth: []

      responses:
        '200':
          description: List of complaints

    post:
      tags:
        - Complaints

      summary: Create a new complaint

      security:
        - bearerAuth: []

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - title
                - description
                - roomNumber

              properties:
                title:
                  type: string

                description:
                  type: string

                roomNumber:
                  type: string

      responses:
        '201':
          description: Complaint created successfully

        '401':
          description: Unauthorized

  /complaints/{id}:

    get:
      tags:
        - Complaints

      summary: Get complaint by ID

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: string

      responses:
        '200':
          description: Complaint found

        '404':
          description: Complaint not found

    put:
      tags:
        - Complaints

      summary: Update complaint

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: string

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              properties:
                status:
                  type: string

      responses:
        '200':
          description: Complaint updated successfully

        '404':
          description: Complaint not found

    delete:
      tags:
        - Complaints

      summary: Delete complaint

      security:
        - bearerAuth: []

      parameters:
        - in: path
          name: id
          required: true

          schema:
            type: string

      responses:
        '200':
          description: Complaint deleted successfully

        '404':
          description: Complaint not found
